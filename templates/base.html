<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan's Media Rankings</title>
    <!-- Your new Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Shared Navigation Bar -->
    <nav>
        <h2 style="margin: 0;">
            <a href="/" style="color: white; text-decoration: none;">Ryan's Media Rankings</a>
        </h2>
        
        <div style="display: flex; gap: 15px; align-items: center;">
            {% if session.get('admin') %}
                <span style="color: #00ff00; font-size: 14px;">Logged in as Admin</span>
                
                <!-- THE FIX IS HERE: Changed the button to an <a> link pointing to /add -->
                <a href="/add" style="background: var(--movie-accent); color: white; border: none; padding: 8px 12px; border-radius: 4px; text-decoration: none; font-weight: bold; cursor: pointer;">+ Add Media</a>
                
                <a href="/logout" style="color: var(--garbage-color); text-decoration: none; font-weight: bold;">Logout</a>
            {% else %}
                <a href="/login" style="color: white; text-decoration: none; font-weight: bold;">Admin Login</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
