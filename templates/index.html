<!-- templates/index.html -->
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<nav>
    <h2>Ryan's Media Rankings</h2>
    <form action="/" method="GET">
        <select name="filter" onchange="this.form.submit()">
            <option value="All">All Types</option>
            <option value="Movie" {% if filter_type == 'Movie' %}selected{% endif %}>Movies</option>
            <option value="TV Show" {% if filter_type == 'TV Show' %}selected{% endif %}>TV Shows</option>
            <option value="Videogame" {% if filter_type == 'Videogame' %}selected{% endif %}>Videogames</option>
            <option value="Album" {% if filter_type == 'Album' %}selected{% endif %}>Albums</option>
            <option value="Single" {% if filter_type == 'Single' %}selected{% endif %}>Singles</option>
            <option value="Songs" {% if filter_type == 'Songs' %}selected{% endif %}>All Songs</option>
        </select>
    </form>
    {% if session['admin'] %}
        <a href="/logout">Logout Admin</a>
    {% else %}
        <a href="/login">Login</a>
    {% endif %}
</nav>

<div class="grid">
    {% for item in media_items %}
    
    <!-- Wrapper to apply the rainbow border ONLY if legendary -->
    <div class="{% if is_legendary(item.media_type, item.score) %}legendary-border{% endif %}">
        <a href="/media/{{ item.id }}" style="text-decoration: none; color: inherit;">
            <div class="card">
                <img src="{{ item.poster_url or 'https://via.placeholder.com/200x300' }}" alt="Poster">
                <div class="card-info">
                    <h4>{{ item.title }}</h4>
                    <span style="font-size: 12px; color: var(--text-muted);">{{ item.release_year }}</span>
                    <br>
                    <!-- Apply Blue/Green/Red/Purple/Yellow based on type -->
                    <span style="font-size: 12px; padding: 2px 6px; border-radius: 4px;" 
                          class="tag-{{ get_media_color(item.media_type) }}">
                        {{ item.media_type }}
                    </span>
                    <h3 style="margin: 5px 0;">⭐ {{ item.score }}</h3>
                </div>
            </div>
        </a>
    </div>
    {% endfor %}
</div>
